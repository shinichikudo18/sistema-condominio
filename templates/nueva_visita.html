{% extends 'base.html' %}
{% block title %}Nueva Visita{% endblock %}
{% block content %}
<h2>Registrar Nueva Visita</h2>
<form method="POST" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Nombre completo *</label>
        <input type="text" name="nombre" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">DNI</label>
        <input type="text" name="dni" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Departamento que visita *</label>
        <select name="departamento_id" class="form-select" required>
            <option value="">Seleccionar...</option>
            {% for dept in departamentos %}
            <option value="{{ dept.id }}">{{ dept.numero }} - {{ dept.propietario }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Motivo de la visita</label>
        <input type="text" name="motivo" class="form-control" placeholder="Ej: Visita familiar, Delivery">
    </div>
    <button type="submit" class="btn btn-primary">Registrar Visita</button>
    <a href="{{ url_for('visitas') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
