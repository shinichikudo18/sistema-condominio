{% extends 'base.html' %}
{% block title %}Departamentos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Departamentos</h2>
    <a href="{{ url_for('nuevo_departamento') }}" class="btn btn-primary">+ Nuevo Departamento</a>
</div>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Número</th>
            <th>Piso</th>
            <th>Propietario</th>
        </tr>
    </thead>
    <tbody>
        {% for dept in departamentos %}
        <tr>
            <td><strong>{{ dept.numero }}</strong></td>
            <td>{{ dept.piso }}</td>
            <td>{{ dept.propietario }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
